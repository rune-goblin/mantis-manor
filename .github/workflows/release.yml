name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into module.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Build zip
        run: |
          zip -r mantis-manor.zip . \
            -x ".git/*" -x ".github/*" -x ".gitattributes" -x ".gitignore" \
            -x ".DS_Store" -x "packs/_source/*" -x "packs/*/LOCK" \
            -x "packs/*/LOG" -x "packs/*/LOG.old" -x "packs/*/*.log" \
            -x "mantis-manor.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mantis-manor.zip
            module.json
          generate_release_notes: true
